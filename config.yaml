active_filament: "ELEGOO PLA+"
active_nozzle: "0.4mm"

calibration:
  tier2_min_runs: 4
  tier3_min_runs: 11
  tier2_auto_proceed_variance: 0.05   # 5% from last known-good
  speed_step_percent: 10
  speed_quality_threshold: 0.80

vision:
  quality_dimensions:
    - stringing
    - layer_adhesion
    - warping
    - surface_finish
    - overall

dashboard:
  port: 8000
  ha_poll_interval_seconds: 5

ha:
  printer_ip: "192.168.1.137"   # direct FlashForge binary protocol (port 8899)
  snapshot_entity: "camera.flashforge_adventurer_5m_pro_camera"
  status_entity: "sensor.flashforge_adventurer_5m_pro_flashforge_status"
  printing_entity: "binary_sensor.flashforge_printing"
  progress_entity: "sensor.flashforge_adventurer_5m_pro_flashforge_print_progress"
  eta_entity: "sensor.flashforge_adventurer_5m_pro_flashforge_estimated_time_remaining"
  nozzle_temp_entity: "sensor.flashforge_adventurer_5m_pro_flashforge_right_nozzle_temperature"
  bed_temp_entity: "sensor.flashforge_adventurer_5m_pro_flashforge_platform_temperature"
  print_speed_entity: "sensor.flashforge_adventurer_5m_pro_flashforge_current_print_speed"

orca:
  # Pacman install (active): ~/.config/OrcaSlicer/OrcaSlicer.conf
  # Flatpak remnant (stale, last used 2025-07): ~/.var/app/io.github.softfever.OrcaSlicer/config/OrcaSlicer/OrcaSlicer.conf
  conf_path: "~/.config/OrcaSlicer/OrcaSlicer.conf"
  cache_dir: "~/.config/OrcaSlicer/cache"
  # Directory where OrcaSlicer exports gcode — check OrcaSlicer > File > Export > last used path
  gcode_output_dir: "~/projects/3D Printing"
  # Live session temp dir — OrcaSlicer writes here for ALL loaded models, even unsaved ones
  tmp_dir: "/tmp/orcaslicer_model"
